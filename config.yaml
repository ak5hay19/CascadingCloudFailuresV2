# config.yaml — ST-GNN for Cascading Cloud Failures
# Hardware: RTX 4060 Mobile 8GB / 16GB RAM / Windows 11
# CRITICAL: Do NOT exceed batch_size: 2 or hidden_dim: 32 (OOM on 8GB VRAM)

data:
  filename: "borg_traces_half.csv"
  time_window_sec: 300          # 5-minute windows
  prediction_horizon: 3         # predict 15 minutes ahead
  sequence_length: 6            # 6 windows = 30 min history
  train_ratio: 0.70
  val_ratio: 0.15
  # test = 1 - 0.70 - 0.15 = 0.15

model:
  hidden_dim: 32                # HARD LIMIT — 48 causes OOM
  num_gnn_layers: 2             # 2-hop for cascade detection
  dropout: 0.3
  edge_drop_rate: 0.3           # graph-structure regularization

training:
  batch_size: 2                 # HARD LIMIT — higher causes OOM
  epochs: 10                    # fits 30-60 min window
  learning_rate: 0.001
  weight_decay: 0.0001
  gradient_clip: 1.0
  early_stopping_patience: 5
  focal_alpha: 0.99             # extreme imbalance (~0.0001 failure rate)
  focal_gamma: 3.0              # aggressive down-weight of easy negatives
  num_workers: 0                # HARD LIMIT — >1 causes Error 1455 on Windows
