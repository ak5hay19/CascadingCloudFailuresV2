# ============================================================
# Configuration — GraphSAGE on Full Graph
# RTX 4060 Mobile (8GB VRAM) / 16GB RAM
# ============================================================

data:
  filename: "borg_traces_data.csv"
  time_window_sec: 300          # 5-minute buckets
  prediction_horizon: 3         # predict 15 min ahead
  sequence_length: 6            # 30 min of history
  max_nodes: null               # null = use ALL nodes (no subsampling)
  train_ratio: 0.7
  val_ratio: 0.15
  test_ratio: 0.15

model:
  hidden_dim: 48
  num_gnn_layers: 2             # 2-layer GraphSAGE for 2-hop neighborhoods
  dropout: 0.3
  num_neighbors: 15             # sample 15 neighbors per node per layer
  use_edge_weight: true

training:
  epochs: 30
  batch_size: 8                 # gradient accumulation over 8 sequences
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 10
  gradient_clip: 1.0
  focal_alpha: 0.75
  focal_gamma: 2.0

evaluate:
  top_k_critical: 20
  tsne_samples: 2000
  max_vis_nodes: 120
